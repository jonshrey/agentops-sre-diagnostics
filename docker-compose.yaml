services:
  backend:
    build:
      context: ./backend
    container_name: agentops-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data

  frontend:
    build:
      context: ./frontend
    container_name: agentops-frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000/diagnose
    depends_on:
      - backend